<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BluetoothFixer</title>
  <link rel="stylesheet" href="destyle.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>BluetoothFixer</h1>
    </header>

    <main>
      <section class="card">
        <h2>Bluetooth デバイス管理</h2>

        <div class="tab-bar">
          <button class="tab-btn active" data-tab="scan">スキャン</button>
          <button class="tab-btn" data-tab="connect">接続</button>
          <button class="tab-btn" data-tab="saved">昔のと接続</button>
        </div>

        <div class="form-group">
          <label>使用するコマンドを選ぶ:</label>
          <select id="commandSelect" class="select-input">
            <option value="blew">blew</option>
            <option value="blueutil">blueutil</option>
          </select>
        </div>

        <div class="tab-content active" id="tab-scan">
          <div class="form-group">
            <button id="scanBtn" class="btn btn-primary">デバイスをスキャン</button>
          </div>
          <p class="hint-text">blew は <code>blew scan</code>、blueutil は <code>blueutil --inquiry</code> を実行します。</p>
        </div>

        <div class="tab-content" id="tab-connect">
          <div class="form-group">
            <label for="deviceId">接続するデバイス ID:</label>
            <input type="text" id="deviceId" placeholder="例: 00:1A:2B:3C:4D:5E">
          </div>
          <div class="form-group">
            <button id="launchBtn" class="btn btn-primary">接続</button>
          </div>
        </div>

        <div class="tab-content" id="tab-saved">
          <div class="form-group">
            <label for="savedDevices">保存済みデバイスから選択:</label>
            <select id="savedDevices" class="select-input">
              <option value="">-- 保存済みデバイスを選択 --</option>
            </select>
          </div>
          <div class="form-group">
            <button id="connectSavedBtn" class="btn btn-secondary">選択デバイスに接続</button>
          </div>
        </div>

        <div class="form-group output-block">
          <label>実行結果:</label>
          <div id="output" class="output">ボタンを押すとここに結果が表示されます</div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const scanBtn = document.getElementById('scanBtn');
    const deviceIdInput = document.getElementById('deviceId');
    const launchBtn = document.getElementById('launchBtn');
    const commandSelect = document.getElementById('commandSelect');
    const savedDevicesSelect = document.getElementById('savedDevices');
    const connectSavedBtn = document.getElementById('connectSavedBtn');
    const output = document.getElementById('output');
    const tabButtons = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');

    function showTab(tabName) {
      tabButtons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabName);
      });
      tabContents.forEach(content => {
        content.classList.toggle('active', content.id === `tab-${tabName}`);
      });
    }

    tabButtons.forEach(button => {
      button.addEventListener('click', () => showTab(button.dataset.tab));
    });

    async function loadSavedDevices() {
      try {
        const devices = await window.api.getSavedDevices();
        savedDevicesSelect.innerHTML = '<option value="">-- 保存済みデバイスを選択 --</option>';
        (Array.isArray(devices) ? devices : []).forEach(device => {
          const option = document.createElement('option');
          option.value = device;
          option.textContent = device;
          savedDevicesSelect.appendChild(option);
        });
      } catch (error) {
        console.error('Failed to load saved devices:', error);
      }
    }

    scanBtn.addEventListener('click', async () => {
      output.textContent = 'Bluetooth デバイスをスキャン中...';
      try {
        const command = commandSelect.value === 'blew'
          ? 'blew scan'
          : 'blueutil --inquiry';
        const result = await window.api.runCommand(command);
        output.textContent = `スキャン結果:\n${result}`;
      } catch (error) {
        output.textContent = `スキャンエラー: ${error.message}`;
      }
    });

    connectSavedBtn.addEventListener('click', async () => {
      const deviceId = savedDevicesSelect.value;
      if (deviceId) {
        deviceIdInput.value = deviceId;
        launchBtn.click();
      } else {
        output.textContent = 'デバイスを選択してください';
      }
    });

    launchBtn.addEventListener('click', async () => {
      const deviceId = deviceIdInput.value.trim();
      const command = commandSelect.value;

      if (!deviceId) {
        output.textContent = 'デバイス ID を入力してください';
        return;
      }

      output.textContent = '接続中...';
      try {
        const commandStr = command === 'blew'
          ? `blew connect "${deviceId}"`
          : `blueutil --pair "${deviceId}"`;
        const result = await window.api.runCommand(commandStr);
        output.textContent = `接続成功:\n${result}`;
        await window.api.saveDevice(deviceId);
        loadSavedDevices();
      } catch (error) {
        output.textContent = `エラー: ${error.message}`;
      }
    });

    window.api.onConnectToDevice((deviceId) => {
      deviceIdInput.value = deviceId;
      launchBtn.click();
    });

    window.api.onUpdateAvailable(() => {
      if (confirm('新しいバージョンが利用可能です。ダウンロードしますか？')) {
        output.textContent = '更新をダウンロード中...';
      }
    });

    window.api.onUpdateDownloaded(() => {
      if (confirm('更新の準備が完了しました。再起動してインストールしますか？')) {
        window.close();
      }
    });

    loadSavedDevices();
  </script>
</body>
</html>
